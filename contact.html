<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0b0a">
  <title>{{marca}} — Contact</title>
  <meta name="description" content="Get in touch with the production company.">
  <meta property="og:title" content="TWO WAVES — Contact">
  <meta property="og:description" content="Let's start your project. Get in touch with Two Waves.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://i.vimeocdn.com/video/1913280099-d00b614e9dd0bf536793b488e210fe622bf6c0adbf4a344a54b6ac15d7cf0ed8-d_1280?region=us">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://player.vimeo.com">
  <link rel="preconnect" href="https://i.vimeocdn.com">
  <link rel="preconnect" href="https://f.vimeocdn.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

  <a class="saltar-contenido" href="#contenido">Skip to content</a>

  <header class="nav">
    <a href="index.html" class="nav_logo"><span data-marca>—</span></a>
    <nav class="nav_links" aria-label="Main navigation">
      <a class="nav_link" href="index.html">Home</a>
      <a class="nav_link" href="work.html">Work</a>
      <a class="nav_link" href="about.html">About</a>
      <span class="nav_borde"></span>
    </nav>
    <a class="nav_cta" href="contact.html"><span class="nav_cta_texto">Contact</span></a>
    <button class="nav_hamburguesa" aria-label="Open menu"><i></i><i></i><i></i></button>
  </header>

  <div class="menu-movil">
    <a href="index.html"><span>Home</span></a>
    <a href="work.html"><span>Work</span></a>
    <a href="about.html"><span>About</span></a>
    <a href="contact.html"><span>Contact</span></a>
  </div>

  <main id="contenido">
    <section class="seccion" data-tema="profundo" style="min-height: 100svh; display: grid; align-content: center;">
      <div class="bloque bloque--centrado">
        <span class="etiqueta">Contact</span>
        <h1 class="titulo-seccion" data-texto="contacto.titulo"></h1>
        <a class="correo-grande" data-correo href="#" data-texto="contacto.correo"></a>
        <p class="etiqueta" style="text-align:center;" data-texto="contacto.direccion"></p>

        <!-- Formulario: en Netlify llega solo; en local abre tu correo -->
        <form class="formulario" name="contacto" method="POST" data-netlify="true" data-formulario>
          <input type="hidden" name="form-name" value="contacto">
          <div class="formulario_fila">
            <label class="formulario_campo">
              <span class="etiqueta">Name</span>
              <input type="text" name="nombre" required autocomplete="name">
            </label>
            <label class="formulario_campo">
              <span class="etiqueta">Email</span>
              <input type="email" name="correo" required autocomplete="email">
            </label>
          </div>
          <label class="formulario_campo">
            <span class="etiqueta">Tell us about your project</span>
            <textarea name="mensaje" rows="4" required></textarea>
          </label>
          <button class="boton formulario_enviar" type="submit">Send</button>
          <p class="formulario_gracias etiqueta" hidden>Thank you — we'll get back to you soon.</p>
        </form>

        <div style="display:flex; gap:1rem;">
          <a class="boton" data-red="instagram" href="#" target="_blank" rel="noopener">Instagram</a>
          <a class="boton" data-red="vimeo" href="#" target="_blank" rel="noopener">Vimeo</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="pie seccion" data-tema="profundo">
    <div class="pie_superior">
      <div class="pie_columna">
        <span class="etiqueta">Menu</span>
        <a href="index.html">Home</a>
        <a href="work.html">Work</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="pie_columna">
        <span class="etiqueta">Social</span>
        <a data-red="instagram" href="#" target="_blank" rel="noopener">Instagram</a>
        <a data-red="vimeo" href="#" target="_blank" rel="noopener">Vimeo</a>
      </div>
      <div class="pie_columna">
        <span class="etiqueta">Contact</span>
        <a data-correo href="#" data-texto="contacto.correo"></a>
        <span data-texto="contacto.direccion"></span>
      </div>
    </div>
    <div class="pie_marca" data-marca aria-hidden="true"></div>
    <div class="pie_legal">
      <span>© <span data-anio></span> <span data-marca></span>. All rights reserved.</span>
      <span data-texto="marca.ciudad"></span>
    </div>
  </footer>

  <dialog class="modal-video">
    <div class="modal-video_fondo" data-cerrar-modal></div>
    <div class="modal-video_contenido">
      <button class="modal-video_cerrar" data-cerrar-modal>Close ✕</button>
      <div class="modal-video_caja">
        <div class="modal-video_marco"></div>
        <div class="modal-video_info">
          <div class="modal-video_metas">
            <div class="modal-video_meta">
              <span class="etiqueta">Client</span>
              <span class="modal-video_cliente"></span>
            </div>
            <div class="modal-video_meta">
              <span class="etiqueta">Project</span>
              <span class="modal-video_proyecto"></span>
            </div>
          </div>
          <p class="modal-video_descripcion"></p>
        </div>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Flip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="contenido.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
