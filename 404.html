  <style>
    /* Página autónoma: sin dependencias del resto del sitio para que
       SIEMPRE cargue, aunque el error sea justo de un asset roto. */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: grid;
      place-content: center;
      gap: 1.6rem;

      color: #e7e2d6;

    }
    h1 {
      font-size: clamp(1.9rem, 5vw, 3.2rem);

      text-transform: uppercase;

    h1 span { color: #b0a595; }
    p { font-size: 1rem; opacity: 0.75; max-width: 38ch; margin-inline: auto; line-height: 1.55; }
    a.volver {
      display: inline-block;
      margin-inline: auto;
      margin-top: 0.4rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #e7e2d6;
      text-decoration: none;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid rgba(231, 226, 214, 0.25);
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    a.volver:hover { color: #b0a595; border-color: #b0a595; }
