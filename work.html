        <a class="boton" href="contact.html" data-revelar>Contact</a>
      </div>

    <div class="pie_superior">

    <div class="modal-video_contenido">

          <h3 class="modal-video_titulo"></h3>

              <div class="modal-video_meta">

              <div class="modal-video_meta">
                <span class="etiqueta">Year</span>
                <span class="modal-video_anio"></span>
              </div>
            </div>
            <p class="modal-video_descripcion"></p>
          </div>
        </div>

    </div>
