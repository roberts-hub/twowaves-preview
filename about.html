<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{marca}} — Nosotros</title>
  <meta name="description" content="Conoce a la casa productora.">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav_logo"><span data-marca>—</span></a>
    <nav class="nav_links" aria-label="Navegación principal">
      <a class="nav_link" href="index.html">Inicio</a>
      <a class="nav_link" href="work.html">Trabajo</a>
      <a class="nav_link" href="about.html">Nosotros</a>
      <span class="nav_borde"></span>
    </nav>
    <a class="nav_cta" href="contact.html"><span class="nav_cta_texto">Contacto</span></a>
    <button class="nav_hamburguesa" aria-label="Abrir menú"><i></i><i></i><i></i></button>
  </header>

  <div class="menu-movil">
    <a href="index.html"><span>Inicio</span></a>
    <a href="work.html"><span>Trabajo</span></a>
    <a href="about.html"><span>Nosotros</span></a>
    <a href="contact.html"><span>Contacto</span></a>
  </div>

  <main>
    <section class="seccion" data-tema="panel" style="min-height: 72svh; display: grid; align-content: end;">
      <div class="bloque">
        <span class="etiqueta">Nosotros</span>
        <h1 class="titulo-gigante" style="margin-top: 0.5rem;" data-texto="nosotros.titulo"></h1>
      </div>
    </section>

    <section class="seccion" data-tema="base">
      <div class="bloque" style="display: grid; gap: 1.5rem; max-width: 70ch;">
        <p class="parrafo" data-revelar data-texto="nosotros.parrafos.0"></p>
        <p class="parrafo" data-revelar data-texto="nosotros.parrafos.1"></p>
        <ul class="lista-servicios" data-servicios></ul>
      </div>
    </section>

    <section class="seccion" data-tema="acento">
      <div class="bloque bloque--centrado">
        <h2 class="titulo-seccion" data-revelar>Trabajemos <span class="acento-serif">juntos.</span></h2>
        <a class="boton" href="contact.html" data-revelar>Contacto</a>
      </div>
    </section>
  </main>

  <footer class="pie seccion" data-tema="profundo">
    <div class="pie_superior">
      <div class="pie_columna">
        <span class="etiqueta">Menú</span>
        <a href="index.html">Inicio</a>
        <a href="work.html">Trabajo</a>
        <a href="about.html">Nosotros</a>
        <a href="contact.html">Contacto</a>
      </div>
      <div class="pie_columna">
        <span class="etiqueta">Redes</span>
        <a data-red="instagram" href="#" target="_blank" rel="noopener">Instagram</a>
        <a data-red="vimeo" href="#" target="_blank" rel="noopener">Vimeo</a>
      </div>
      <div class="pie_columna">
        <span class="etiqueta">Contacto</span>
        <a data-correo href="#" data-texto="contacto.correo"></a>
        <span data-texto="contacto.direccion"></span>
      </div>
    </div>
    <div class="pie_marca" data-marca aria-hidden="true"></div>
    <div class="pie_legal">
      <span>© <span data-anio></span> <span data-marca></span>. Todos los derechos reservados.</span>
      <span data-texto="marca.ciudad"></span>
    </div>
  </footer>

  <dialog class="modal-video">
    <div class="modal-video_fondo" data-cerrar-modal></div>
    <div class="modal-video_contenido">
      <span class="modal-video_titulo"></span>
      <button class="modal-video_cerrar" data-cerrar-modal>Cerrar ✕</button>
      <div class="modal-video_marco"></div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Flip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="contenido.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
